# === Опціональні сервіси для демо асинхронних інтеграцій (Слайд 11) ===
# Запуск: docker compose up -d
# Зупинка: docker compose down
#
# Якщо ці сервіси не запущені — додаток усе одно стартує, але
# Kafka producer/consumer-и будуть писати warning у логи.
services:
  # === Слайд 11 — Kafka broker ===
  # Два listener-и:
  #   - HOST (9092)     → доступ з хоста (наш Spring Boot додаток),
  #   - INTERNAL (29092) → доступ з інших контейнерів (kafka-ui).
  kafka:
    image: apache/kafka:3.8.0
    container_name: api-example-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: HOST://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: HOST:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "kafka-cluster-demo-1"

  # === Слайди 9, 11 — Kafka UI (Kafbat) ===
  # Готовий веб-інтерфейс для перегляду топіків, повідомлень, груп консьюмерів.
  # Відкрити: http://localhost:8090
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: api-example-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka
